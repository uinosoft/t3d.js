<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>t3d - large static batch</title>
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link type="text/css" rel="stylesheet" href="main.css">
	<style>
		#statsPanel {
			position: absolute;
			top: 12px;
			left: 12px;
			padding: 12px 14px;
			background: rgba(14, 18, 24, 0.78);
			border: 1px solid rgba(255, 255, 255, 0.14);
			border-radius: 10px;
			color: #e8eef7;
			font: 12px/1.55 Consolas, Monaco, monospace;
			white-space: pre-line;
			pointer-events: none;
		}

		#statusError {
			color: #ff9e96;
			font-weight: 700;
		}
	</style>
</head>

<body>
	<div id="info">
		<a href="" target="_blank">t3d</a> - large static batch<br />
		Single batched mesh using <code>WEBGL_multi_draw</code> + CPU culling + Texture2DArray.<br />
		<div id="statusError" style="display:none"></div>
	</div>
	<div id="statsPanel"></div>

	<script async src="./libs/es-module-shims.js"></script>

	<script type="importmap">
		{
			"imports": {
				"t3d": "../build/t3d.module.js",
				"t3d/addons/": "./jsm/"
			}
		}
	</script>

	<script type="module">
		import * as t3d from 't3d';
		import { OrbitControls } from 't3d/addons/controls/OrbitControls.js';
		import { GLTFLoader } from 't3d/addons/loaders/glTF/GLTFLoader.js';
		import { TextureCubeLoader } from 't3d/addons/loaders/TextureCubeLoader.js';
		import { SkyBox } from 't3d/addons/objects/SkyBox.js';
		import { ForwardRenderer } from 't3d/addons/render/ForwardRenderer.js';
		import { GUI } from './libs/lil-gui.esm.min.js';
		import Stats from './libs/stats.module.js';
		import { LargeStaticBatchPickMaterial } from './jsm/materials/LargeStaticBatchPickMaterial.js';
		import { LargeStaticBatch } from './jsm/objects/LargeStaticBatch.js';

		const MODEL_URL = 'http://10.100.41.9:8080/World.gltf';
		const DEFAULT_LAYER_SIZE = 512;
		const TEXTURE_ARRAY_TOTAL_BUDGET_MB = 96;

		let width = window.innerWidth || 2;
		let height = window.innerHeight || 2;

		const canvas = document.createElement('canvas');
		canvas.width = width;
		canvas.height = height;
		document.body.appendChild(canvas);

		const statsPanel = document.getElementById('statsPanel');
		const statusError = document.getElementById('statusError');

		const renderer = new ForwardRenderer(canvas);
		const capabilities = renderer.capabilities;
		const hasWebGL2 = capabilities.version >= 2;
		const multiDrawExtension = capabilities.getExtension('WEBGL_multi_draw');
		const supported = hasWebGL2 && !!multiDrawExtension;

		if (!hasWebGL2) {
			statusError.style.display = '';
			statusError.textContent = 'This example requires WebGL2 because Texture2DArray and texelFetch are mandatory in v1.';
		} else if (!multiDrawExtension) {
			statusError.style.display = '';
			statusError.textContent = 'WEBGL_multi_draw is not supported on this browser / GPU combination.';
		}

		const scene = new t3d.Scene();
		scene.fog = new t3d.Fog(0x0b1220, 350, 1600);

		const cubeTexturePath = './resources/skybox/Bridge2/';
		const environmentTexture = new TextureCubeLoader().load([
			cubeTexturePath + 'posx.jpg',
			cubeTexturePath + 'negx.jpg',
			cubeTexturePath + 'posy.jpg',
			cubeTexturePath + 'negy.jpg',
			cubeTexturePath + 'posz.jpg',
			cubeTexturePath + 'negz.jpg'
		]);
		environmentTexture.encoding = t3d.TEXEL_ENCODING_TYPE.SRGB;
		scene.environment = environmentTexture;

		const skyBox = new SkyBox(environmentTexture);
		skyBox.level = 0;
		skyBox.gamma = true;
		scene.add(skyBox);

		const ambientLight = new t3d.AmbientLight(0xffffff, 0.35);
		scene.add(ambientLight);

		const directionalLight = new t3d.DirectionalLight(0xffffff, 1.2);
		directionalLight.position.set(30, 80, 35);
		directionalLight.lookAt(new t3d.Vector3(), new t3d.Vector3(0, 1, 0));
		scene.add(directionalLight);

		const camera = new t3d.Camera();
		camera.outputEncoding = t3d.TEXEL_ENCODING_TYPE.SRGB;
		camera.position.set(420, 260, 420);
		camera.lookAt(new t3d.Vector3(0, 0, 0), new t3d.Vector3(0, 1, 0));
		camera.setPerspective(50 / 180 * Math.PI, width / height, 1, 3000);
		scene.add(camera);

		const controls = new OrbitControls(camera, canvas);
		controls.target.set(0, 0, 0);

		const fpsStats = new Stats();
		fpsStats.domElement.style.position = 'absolute';
		fpsStats.domElement.style.right = '0px';
		fpsStats.domElement.style.left = 'auto';
		fpsStats.domElement.style.top = '0px';
		canvas.parentElement.appendChild(fpsStats.domElement);

		const params = {
			objectCount: 0,
			enableBVH: true,
			enablePerObjectCulling: true,
			renderTransparent: false,
			animationEnabled: true,
			useBaseColorMap: true,
			useNormalMap: true,
			useORMMap: true,
			useAlphaTest: true,
			showNormalMapOnly: false,
			showTangentSpaceHealth: false,
			forceFlatNormal: false,
			useMipmaps: true,
			freezeCulling: false,
			showStats: true,
			leafSize: 16
		};

		const gui = new GUI();
		gui.add(params, 'objectCount').name('objectCount').listen();

		let batches = [];
		let animationMixer = null;
		let animationActions = [];
		let defaultActiveAnimationActionIndices = [];
		let animatedNodes = new Set();
		let pickRenderTarget = null;
		let batchPickIdRanges = [];
		let selectedPickInfo = null;
		let pickingBound = false;
		const pickPixels = new Uint8Array(4);
		let transparentRoot = null;
		let textureArraySet = null;
		let lastFrameTime = performance.now();
		let modelDiagnostics = {
			transparentMeshes: 0,
			incompatibleMeshes: 0,
			texturePlans: null
		};

		gui.add(params, 'enableBVH').onChange(value => {
			if (batches.length === 0) return;
			for (let i = 0; i < batches.length; i++) {
				const batch = batches[i];
				batch.enableBVH = value;
				if (value && (!batch.bvh || batch.leafSize !== params.leafSize)) {
					batch.rebuildBVH(params.leafSize);
				}
				batch.update(camera);
			}
		});
		gui.add(params, 'enablePerObjectCulling').onChange(value => {
			if (batches.length === 0) return;
			for (let i = 0; i < batches.length; i++) {
				batches[i].enablePerObjectCulling = value;
				batches[i].update(camera);
			}
		});
		gui.add(params, 'renderTransparent').onChange(value => {
			if (transparentRoot) {
				transparentRoot.visible = value;
			}
		});
		gui.add(params, 'animationEnabled').name('animation').onChange(value => {
			applyDefaultAnimationWeights(value);
		});
		gui.add(params, 'useBaseColorMap').onChange(() => {
			syncBatchMaterialUniforms();
		});
		gui.add(params, 'useNormalMap').onChange(value => {
			syncBatchMaterialUniforms();
		});
		gui.add(params, 'useORMMap').onChange(value => {
			syncBatchMaterialUniforms();
		});
		gui.add(params, 'useAlphaTest').onChange(() => {
			syncBatchMaterialUniforms();
		});
		gui.add(params, 'showNormalMapOnly').onChange(() => {
			syncBatchMaterialUniforms();
		});
		gui.add(params, 'showTangentSpaceHealth').onChange(() => {
			syncBatchMaterialUniforms();
		});
		gui.add(params, 'forceFlatNormal').onChange(() => {
			syncBatchMaterialUniforms();
		});
		gui.add(params, 'useMipmaps').onChange(value => {
			toggleTextureArrayMipmaps(textureArraySet, value);
		});
		gui.add(params, 'freezeCulling').onChange(value => {
			if (batches.length === 0) return;
			for (let i = 0; i < batches.length; i++) {
				batches[i].freezeCulling = value;
				if (!value) batches[i].update(camera);
			}
		});
		gui.add(params, 'showStats').onChange(value => {
			statsPanel.style.display = value ? '' : 'none';
			fpsStats.domElement.style.display = value ? '' : 'none';
		});
		gui.add(params, 'leafSize', 4, 64, 4).onChange(value => {
			if (batches.length === 0) return;
			for (let i = 0; i < batches.length; i++) {
				batches[i].rebuildBVH(value);
				batches[i].update(camera);
			}
		});

		if (supported) {
			try {
				await initModelBatch();
			} catch (error) {
				console.error(error);
				statusError.style.display = '';
				statusError.textContent = `Failed to load or batch World.gltf: ${error.message}`;
			}
		}

		function loop() {
			requestAnimationFrame(loop);

			fpsStats.begin();
			const now = performance.now();
			const delta = Math.max(0, (now - lastFrameTime) / 1000);
			lastFrameTime = now;

			if (animationMixer && params.animationEnabled) {
				animationMixer.update(delta);
			}
			controls.update();
			scene.updateMatrix();

			if (batches.length > 0) {
				for (let i = 0; i < batches.length; i++) {
					const batch = batches[i];
					batch.freezeCulling = params.freezeCulling;
					batch.enableBVH = params.enableBVH;
					batch.enablePerObjectCulling = params.enablePerObjectCulling;
					batch.update(camera);
				}
				updateStatsPanel(batches);
			} else {
				updateUnsupportedStats();
			}

			renderer.render(scene, camera);

			fpsStats.end();
		}

		requestAnimationFrame(loop);

		async function initModelBatch() {
			console.time('load model');
			const loader = new GLTFLoader();
			const result = await loader.load(MODEL_URL);
			console.timeEnd('load model');

			if (result.animations && result.animations.length > 0) {
				animationMixer = new t3d.AnimationMixer();
				animationActions = [];
				animatedNodes = collectAnimatedNodes(result.animations);
				result.animations.forEach(clip => {
					const action = new t3d.AnimationAction(clip);
					animationMixer.addAction(action);
					animationActions.push(action);
				});
				defaultActiveAnimationActionIndices = selectNonConflictingAnimationActionIndices(animationActions);
				applyDefaultAnimationWeights(params.animationEnabled);
			}

			console.time('generate descriptors');
			const modelSource = extractModelSource(result.root, animatedNodes);
			const materials = modelSource.materials;
			modelDiagnostics.transparentMeshes = modelSource.transparentMeshes;
			modelDiagnostics.incompatibleMeshes = modelSource.incompatibleMeshes;
			assignTextureLayerIds(materials);
			const indexedDescriptors = createDescriptorsFromEntries(modelSource.indexedMeshEntries, modelSource.modelNormalizeMatrix, materials);
			const nonIndexedDescriptors = createDescriptorsFromEntries(modelSource.nonIndexedMeshEntries, modelSource.modelNormalizeMatrix, materials);
			console.timeEnd('generate descriptors');

			console.time('upload texture arrays');
			const texturePlans = buildTextureArrayPlans(materials, capabilities);
			modelDiagnostics.texturePlans = texturePlans;
			const baseColorArray = createBaseColorArrayFromMaterials(materials, texturePlans.baseColor);
			const normalMapArray = createNormalMapArrayFromMaterials(materials, texturePlans.normal);
			const ormMapArray = createORMMapArrayFromMaterials(materials, texturePlans.orm);
			const emissiveMapArray = createEmissiveMapArrayFromMaterials(materials, texturePlans.emissive);
			textureArraySet = { baseColorArray, normalMapArray, ormMapArray, emissiveMapArray };
			toggleTextureArrayMipmaps(textureArraySet, params.useMipmaps);
			console.timeEnd('upload texture arrays');

			params.objectCount = indexedDescriptors.length + nonIndexedDescriptors.length;

			console.time('enable rendering');
			batches = [];
			batchPickIdRanges = [];
			createBatchesForDescriptors(indexedDescriptors, materials, textureArraySet);
			createBatchesForDescriptors(nonIndexedDescriptors, materials, textureArraySet);
			initBatchPicking();

			syncBatchMaterialUniforms();

			transparentRoot = result.root;
			transparentRoot.matrixAutoUpdate = false;
			transparentRoot.matrix.copy(modelSource.modelNormalizeMatrix);
			transparentRoot.matrixNeedsUpdate = false;
			transparentRoot.worldMatrixNeedsUpdate = true;
			transparentRoot.visible = params.renderTransparent;
			scene.add(transparentRoot);
			scene.updateMatrix();
			for (let i = 0; i < batches.length; i++) {
				batches[i].update(camera);
			}
			fitCameraToBatches(batches);
			console.timeEnd('enable rendering');
		}

		function updateStatsPanel(batchList) {
			const summary = summarizeBatches(batchList);

			statsPanel.textContent = [
				`model: World.gltf`,
				`batches: ${summary.batchCount} (indexed ${summary.indexedBatchCount}, non-indexed ${summary.nonIndexedBatchCount})`,
				`total objects: ${summary.totalObjects}`,
				`materials: ${summary.materialCount}`,
				`transparent passthrough meshes: ${modelDiagnostics.transparentMeshes}`,
				`transparent render: ${params.renderTransparent ? 'on' : 'off'}`,
				`animation: ${animationActions.length > 0 ? (params.animationEnabled ? `on (${defaultActiveAnimationActionIndices.length}/${animationActions.length} clips)` : `off (${defaultActiveAnimationActionIndices.length}/${animationActions.length} clips)`) : 'none'}`,
				`base color map: ${params.useBaseColorMap ? 'on' : 'off'}`,
				`normal map: ${params.useNormalMap ? 'on' : 'off'}`,
				`show normal map only: ${params.showNormalMapOnly ? 'on' : 'off'}`,
				`tangent space health: ${params.showTangentSpaceHealth ? 'on' : 'off'}`,
				`force flat normal: ${params.forceFlatNormal ? 'on' : 'off'}`,
				`orm map: ${params.useORMMap ? 'on' : 'off'}`,
				`alpha test: ${params.useAlphaTest ? 'on' : 'off'}`,
				`mipmaps: ${params.useMipmaps ? 'on' : 'off'}`,
				`incompatible opaque meshes: ${modelDiagnostics.incompatibleMeshes}`,
				`visible objects: ${summary.visibleObjects}`,
				`total triangles: ${summary.totalTriangles}`,
				`visible triangles: ${summary.visibleTriangles}`,
				`build merged geometry: ${summary.buildMergedGeometryMs.toFixed(2)} ms`,
				`build GPU data textures: ${summary.buildGPUDataTexturesMs.toFixed(2)} ms`,
				`BVH build time: ${summary.bvhBuildMs.toFixed(2)} ms`,
				`CPU culling time: ${summary.cpuCullingMs.toFixed(2)} ms`,
				`tex arrays: ${formatTexturePlans(modelDiagnostics.texturePlans)}`,
				`tex wraps: ${formatTextureWraps(modelDiagnostics.texturePlans)}`,
				`draw mode: ${summary.drawMode}`,
				`extension: ${multiDrawExtension ? 'supported' : 'unsupported'}`,
				`per-object culling: ${params.enablePerObjectCulling ? 'on' : 'off'}`,
				`BVH: ${params.enableBVH ? `on (leaf=${params.leafSize})` : 'off'}`
			].join('\n');
		}

		function updateUnsupportedStats() {
			statsPanel.textContent = [
				`model: World.gltf`,
				`total objects: 0`,
				`transparent passthrough meshes: ${modelDiagnostics.transparentMeshes}`,
				`transparent render: ${params.renderTransparent ? 'on' : 'off'}`,
				`animation: ${animationActions.length > 0 ? (params.animationEnabled ? `on (${defaultActiveAnimationActionIndices.length}/${animationActions.length} clips)` : `off (${defaultActiveAnimationActionIndices.length}/${animationActions.length} clips)`) : 'none'}`,
				`base color map: ${params.useBaseColorMap ? 'on' : 'off'}`,
				`normal map: ${params.useNormalMap ? 'on' : 'off'}`,
				`show normal map only: ${params.showNormalMapOnly ? 'on' : 'off'}`,
				`tangent space health: ${params.showTangentSpaceHealth ? 'on' : 'off'}`,
				`force flat normal: ${params.forceFlatNormal ? 'on' : 'off'}`,
				`orm map: ${params.useORMMap ? 'on' : 'off'}`,
				`alpha test: ${params.useAlphaTest ? 'on' : 'off'}`,
				`mipmaps: ${params.useMipmaps ? 'on' : 'off'}`,
				`incompatible opaque meshes: ${modelDiagnostics.incompatibleMeshes}`,
				`visible objects: 0`,
				`total triangles: 0`,
				`visible triangles: 0`,
				`BVH build time: 0.00 ms`,
				`CPU culling time: 0.00 ms`,
				`tex arrays: ${formatTexturePlans(modelDiagnostics.texturePlans)}`,
				`tex wraps: ${formatTextureWraps(modelDiagnostics.texturePlans)}`,
				`draw mode: multiDraw`,
				`extension: ${multiDrawExtension ? 'supported' : 'unsupported'}`
			].join('\n');
		}

		function extractModelSource(root, animatedNodeSet = new Set()) {
			root.updateMatrix();

			const overallBounds = new t3d.Box3();
			const indexedMeshEntries = [];
			const nonIndexedMeshEntries = [];
			const materials = [];
			const materialMap = new Map();
			let transparentMeshes = 0;
			let incompatibleMeshes = 0;

			root.traverse(node => {
				if (!node.isMesh || !node.geometry) return;

				const geometry = node.geometry;
				const indexed = geometry.index !== null;
				const geometryGroups = Array.isArray(geometry.groups) ? geometry.groups : [];
				const sourceMaterials = Array.isArray(node.material) ? node.material : [node.material];
				const hasMorphTargets = !!(geometry.morphAttributes && Object.keys(geometry.morphAttributes).length > 0);

				if (node.isSkinnedMesh || node.morphTargetInfluences || hasMorphTargets) {
					incompatibleMeshes++;
					return;
				}

				if (!geometry.getAttribute('a_Position')) {
					incompatibleMeshes++;
					return;
				}

				if (!geometry.boundingBox || geometry.boundingBox.isEmpty()) {
					geometry.computeBoundingBox();
				}
				if (!geometry.boundingSphere || geometry.boundingSphere.isEmpty()) {
					geometry.computeBoundingSphere();
				}

				const worldBounds = geometry.boundingBox.clone().applyMatrix4(node.worldMatrix);
				const meshEntries = [];
				let hasOpaqueBatchEntry = false;
				let hasTransparentPassthrough = false;

				if (Array.isArray(node.material) && geometryGroups.length > 0) {
					for (let i = 0; i < geometryGroups.length; i++) {
						const group = geometryGroups[i];
						const sourceMaterial = sourceMaterials[group.materialIndex] || sourceMaterials[0];

						if (!sourceMaterial) {
							incompatibleMeshes++;
							continue;
						}

						if (sourceMaterial.transparent) {
							hasTransparentPassthrough = true;
							continue;
						}

						const materialId = getOrCreateMaterialId(sourceMaterial, materials, materialMap);
						meshEntries.push({
							sourceId: node.uuid,
							sourceNode: node,
							isAnimated: isNodeAffectedByAnimation(node, animatedNodeSet, root),
							geometry,
							matrix: node.worldMatrix.clone(),
							materialId,
							textureLayerId: 0,
							drawStart: group.start,
							drawCount: group.count,
							normalMapHealthy: evaluateDrawItemNormalMapHealth(geometry, group.start, group.count)
						});
						hasOpaqueBatchEntry = true;
					}
				} else {
					const sourceMaterial = sourceMaterials[0];
					if (!sourceMaterial || sourceMaterial.transparent) {
						hasTransparentPassthrough = true;
					} else {
						const materialId = getOrCreateMaterialId(sourceMaterial, materials, materialMap);
						meshEntries.push({
							sourceId: node.uuid,
							sourceNode: node,
							isAnimated: isNodeAffectedByAnimation(node, animatedNodeSet, root),
							geometry,
							matrix: node.worldMatrix.clone(),
							materialId,
							textureLayerId: 0,
							drawStart: 0,
							drawCount: indexed ? geometry.index.buffer.count : geometry.getAttribute('a_Position').buffer.count,
							normalMapHealthy: evaluateDrawItemNormalMapHealth(geometry, 0, indexed ? geometry.index.buffer.count : geometry.getAttribute('a_Position').buffer.count)
						});
						hasOpaqueBatchEntry = true;
					}
				}

				if (hasOpaqueBatchEntry) {
					overallBounds.union(worldBounds);
					const targetEntries = indexed ? indexedMeshEntries : nonIndexedMeshEntries;
					for (let i = 0; i < meshEntries.length; i++) {
						targetEntries.push(meshEntries[i]);
					}
				}

				if (hasTransparentPassthrough) {
					transparentMeshes++;
				}

				if (hasOpaqueBatchEntry && !hasTransparentPassthrough) {
					node.visible = false;
				}
			});

			if (indexedMeshEntries.length === 0 && nonIndexedMeshEntries.length === 0) {
				throw new Error('No compatible opaque static meshes were found in World.gltf.');
			}

			if (transparentMeshes > 0 || incompatibleMeshes > 0) {
				console.warn(`LargeStaticBatch kept ${transparentMeshes} transparent meshes as passthrough and skipped ${incompatibleMeshes} incompatible opaque meshes.`);
			}

			const modelCenter = overallBounds.getCenter(new t3d.Vector3());
			const modelSize = overallBounds.getSize(new t3d.Vector3());
			const maxAxis = Math.max(modelSize.x, modelSize.y, modelSize.z, 1);
			const normalizeScale = 120 / maxAxis;
			const normalizeMatrix = new t3d.Matrix4().makeScale(normalizeScale, normalizeScale, normalizeScale);
			const recenterMatrix = new t3d.Matrix4().makeTranslation(-modelCenter.x, -overallBounds.min.y, -modelCenter.z);
			const modelNormalizeMatrix = new t3d.Matrix4().multiplyMatrices(normalizeMatrix, recenterMatrix);

			return {
				indexedMeshEntries,
				nonIndexedMeshEntries,
				materials,
				modelNormalizeMatrix,
				transparentMeshes,
				incompatibleMeshes
			};
		}

		function createDescriptorsFromEntries(entries, normalizeMatrix, materials) {
			const descriptors = new Array(entries.length);

			for (let i = 0; i < entries.length; i++) {
				const entry = entries[i];
				const normalizedMeshMatrix = new t3d.Matrix4().multiplyMatrices(normalizeMatrix, entry.matrix);

				descriptors[i] = {
					sourceId: entry.sourceId,
					sourceNode: entry.sourceNode,
					isAnimated: entry.isAnimated === true,
					geometry: entry.geometry,
					matrix: normalizedMeshMatrix,
					normalizeMatrix: normalizeMatrix.clone(),
					materialId: entry.materialId,
					textureLayerId: materials[entry.materialId].textureLayerId,
					side: materials[entry.materialId].side,
					hasTangent: !!entry.geometry.getAttribute('a_Tangent'),
					normalMapEnabled: materials[entry.materialId].hasNormalMap && entry.normalMapHealthy !== false && !!entry.geometry.getAttribute('a_Tangent'),
					flipWinding: normalizedMeshMatrix.determinant() < 0,
					drawStart: entry.drawStart,
					drawCount: entry.drawCount
				};
			}

			return descriptors;
		}

		function collectAnimatedNodes(clips) {
			const nodes = new Set();

			for (let i = 0; i < clips.length; i++) {
				const tracks = clips[i].tracks || [];
				for (let j = 0; j < tracks.length; j++) {
					if (tracks[j].target) {
						nodes.add(tracks[j].target);
					}
				}
			}

			return nodes;
		}

		function selectNonConflictingAnimationActionIndices(actions) {
			const selectedIndices = [];
			const occupiedBindings = new Set();

			for (let i = 0; i < actions.length; i++) {
				const action = actions[i];
				const bindings = getActionBindingKeys(action);
				let conflicts = false;

				for (let j = 0; j < bindings.length; j++) {
					if (occupiedBindings.has(bindings[j])) {
						conflicts = true;
						break;
					}
				}

				if (conflicts) {
					continue;
				}

				selectedIndices.push(i);
				for (let j = 0; j < bindings.length; j++) {
					occupiedBindings.add(bindings[j]);
				}
			}

			return selectedIndices;
		}

		function getActionBindingKeys(action) {
			const tracks = action.clip.tracks || [];
			const keys = new Array(tracks.length);

			for (let i = 0; i < tracks.length; i++) {
				const track = tracks[i];

			return [
				`bc ${wrapName(plans.baseColor.wrapS)}/${wrapName(plans.baseColor.wrapT)}`,
				`n ${wrapName(plans.normal.wrapS)}/${wrapName(plans.normal.wrapT)}`,
				`orm ${wrapName(plans.orm.wrapS)}/${wrapName(plans.orm.wrapT)}`,
				`em ${wrapName(plans.emissive.wrapS)}/${wrapName(plans.emissive.wrapT)}`
			].join(', ');
		}

		function wrapName(value) {
			if (value === t3d.TEXTURE_WRAP.REPEAT) return 'repeat';
			if (value === t3d.TEXTURE_WRAP.MIRRORED_REPEAT) return 'mirror';
			return 'clamp';
		}

		function isDrawableImage(image) {
			return !!(image && image.width && image.height);
		}

		function fillSolidLayer(target, offset, width, height, color) {
			const r = Math.round((color[0] !== undefined ? color[0] : 1) * 255);
			const g = Math.round((color[1] !== undefined ? color[1] : 1) * 255);
			const b = Math.round((color[2] !== undefined ? color[2] : 1) * 255);
			const a = Math.round((color[3] !== undefined ? color[3] : 1) * 255);

			for (let i = 0; i < width * height; i++) {
				const pixelOffset = offset + i * 4;
				target[pixelOffset + 0] = r;
				target[pixelOffset + 1] = g;
				target[pixelOffset + 2] = b;
				target[pixelOffset + 3] = a;
			}
		}

		function fillChannelLayer(target, offset, width, height, rgba) {
			for (let i = 0; i < width * height; i++) {
				const pixelOffset = offset + i * 4;
				target[pixelOffset + 0] = rgba[0];
				target[pixelOffset + 1] = rgba[1];
				target[pixelOffset + 2] = rgba[2];
				target[pixelOffset + 3] = rgba[3];
			}
		}

		function onWindowResize() {
			width = window.innerWidth || 2;
			height = window.innerHeight || 2;

			camera.setPerspective(50 / 180 * Math.PI, width / height, 1, 3000);
			renderer.screenRenderTarget.resize(width, height);
			if (pickRenderTarget) {
				pickRenderTarget.resize(width, height);
			}
		}

		window.addEventListener('resize', onWindowResize, false);
	</script>
